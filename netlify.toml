[build]
  command = "quarto render"
  publish = "docs"

# Installer Quarto avant le build
[build.environment]
  # Utiliser une image avec R et Quarto préinstallés (via Netlify's build image)
  # Ou installer Quarto manuellement
  NODE_VERSION = "18"

# Scripts à exécuter avant le build
[context.production.environment]
  # Installer Quarto via un script
  QUARTO_VERSION = "1.4.555"  # Remplace par la dernière version de Quarto : https://quarto.org/docs/download/

[build]
  # Commandes à exécuter avant le build
  pre = """
    wget -qO- https://github.com/quarto-dev/quarto-cli/releases/download/v${QUARTO_VERSION}/quarto-${QUARTO_VERSION}-linux-amd64.deb -O quarto.deb \\
    && sudo dpkg -i quarto.deb \\
    && rm quarto.deb
  """
