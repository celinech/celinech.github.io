[build]
  command = """
    mkdir -p /tmp/quarto-cli \
    && curl -L -o /tmp/quarto-cli/quarto.tar.gz "https://github.com/quarto-dev/quarto-cli/releases/download/v${QUARTO_VERSION}/quarto-${QUARTO_VERSION}-linux-amd64.tar.gz" \
    && tar -xzf /tmp/quarto-cli/quarto.tar.gz -C /tmp/quarto-cli \
    && export PATH="/tmp/quarto-cli/quarto-${QUARTO_VERSION}/bin:$PATH" \
    && quarto --version \
    && quarto render
  """
  publish = "docs"

[build.environment]
  NODE_VERSION = "18"
  QUARTO_VERSION = "1.4.555"
